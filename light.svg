<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="610" viewBox="0 0 1180 610" role="img" aria-label="Pavel Kazakevich - Frontend Engineer">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FAFAFA"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C2410C">
        <animate attributeName="stop-color" values="#C2410C;#EA580C;#F97316;#FB923C;#C2410C" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#EA580C">
        <animate attributeName="stop-color" values="#EA580C;#F97316;#C2410C;#EA580C" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#F97316">
        <animate attributeName="stop-color" values="#F97316;#FB923C;#EA580C;#F97316" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="asciiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="50%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#C2410C"/>
      
    </linearGradient>
    <linearGradient id="shimmerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(234,88,12,0)"/>
      <stop offset="50%" stop-color="rgba(234,88,12,0.2)"/>
      <stop offset="100%" stop-color="rgba(234,88,12,0)"/>
      
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(234,88,12,0.35)"/>
      <stop offset="50%" stop-color="rgba(15,23,42,0.06)"/>
      <stop offset="100%" stop-color="rgba(249,115,22,0.3)"/>
    </linearGradient>
    <radialGradient id="glowOrange" cx="30%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
      <animate attributeName="cx" values="30%;35%;30%" dur="10s" repeatCount="indefinite"/>
    </radialGradient>
    <radialGradient id="glowAmber" cx="75%" cy="70%" r="45%">
      <stop offset="0%" stop-color="#FB923C" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FB923C" stop-opacity="0"/>
      <animate attributeName="cy" values="70%;65%;70%" dur="12s" repeatCount="indefinite"/>
    </radialGradient>
    <radialGradient id="glowDeep" cx="90%" cy="20%" r="35%">
      <stop offset="0%" stop-color="#EA580C" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#EA580C" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="cardClip"><rect x="20" y="20" width="1140" height="570" rx="24"/></clipPath>
    <mask id="noiseMask">
